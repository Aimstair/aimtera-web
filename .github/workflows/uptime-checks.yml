name: Synthetic Uptime Checks

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: secrets.PRODUCTION_BASE_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Synthetic Uptime Smoke
        env:
          SMOKE_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          SMOKE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_BASE_URL }}
          SMOKE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bun run smoke:prod

      - name: Notify Slack On Uptime Failure
        if: failure() && secrets.SLACK_ALERT_WEBHOOK_URL != ''
        env:
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "Synthetic uptime checks failed.",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Synthetic uptime checks failed*\nRepository: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              }
            ]
          }
          JSON
          )
          curl -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_ALERT_WEBHOOK_URL"
