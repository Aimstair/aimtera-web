name: CI Quality Gates

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Lint, Typecheck, Unit Tests, Build, and Perf Budgets
        run: bun run quality:ci

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: bun run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

  production-smoke:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && secrets.PRODUCTION_BASE_URL != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Production Smoke Check
        env:
          SMOKE_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
          SMOKE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_BASE_URL }}
          SMOKE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: bun run smoke:prod

      - name: Notify Slack On Smoke Failure
        if: failure() && secrets.SLACK_ALERT_WEBHOOK_URL != ''
        env:
          SLACK_ALERT_WEBHOOK_URL: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "Production smoke check failed on main branch. Investigate and consider rollback.",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Production smoke check failed*\nRepository: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              }
            ]
          }
          JSON
          )
          curl -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_ALERT_WEBHOOK_URL"
